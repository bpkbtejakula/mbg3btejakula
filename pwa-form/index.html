<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Form Aplikasi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Formulir Kontak</h1>
            <p>Kirim pesan Anda langsung ke Google Sheets</p>
        </header>

        <form id="pwaForm">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" required placeholder="Masukkan nama Anda">
            </div>

            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" required placeholder="Masukkan email Anda">
            </div>

            <div class="form-group">
                <label for="pesan">Pesan</label>
                <textarea id="pesan" rows="4" required placeholder="Tulis pesan Anda di sini..."></textarea>
            </div>

            <button type="submit" id="btnSubmit">Kirim Data</button>
        </form>

        <div id="statusMessage" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
